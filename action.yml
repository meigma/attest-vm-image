name: attest-vm-image
description:
  Inspect a finished QCOW2 VM image and produce signed SBOM, vulnerability,
  contamination, and validation-predicate evidence.
author: Meigma

branding:
  icon: shield
  color: blue

inputs:
  disk-path:
    description: Path to the completed QCOW2 disk image to inspect.
    required: true
  metadata-path:
    description: Incus metadata tarball associated with the disk image.
    required: false
  build-manifest-path:
    description: Builder-generated manifest with source and build information.
    required: false
  output-directory:
    description: Directory the action writes evidence files into.
    required: false
    default: ./evidence
  sbom-format:
    description: SBOM output format, either spdx-json or cyclonedx-json.
    required: false
    default: spdx-json
  fail-on-severity:
    description:
      Vulnerability severity threshold that fails the run - critical, high, or
      none for report-only.
    required: false
    default: high
  policy-path:
    description:
      Contamination-policy file; the built-in policy is used when unset.
    required: false
  signer:
    description:
      Signing backend - none, github, sigstore-keyless, cosign-key, or kms.
    required: false
    default: none
  signing-key:
    description:
      Encrypted key file or env://NAME for signer cosign-key; a reference only,
      never raw private-key bytes.
    required: false
  github-token:
    description:
      Token used by signer github to push attestations to the GitHub attestation
      API. Defaults to the job token and must carry the attestations write
      permission; rarely needs overriding.
    required: false
    default: ${{ github.token }}

outputs:
  disk-digest:
    description: sha256:<hex> of the input QCOW2 image.
  checksums-path:
    description: Path to the generated checksums.txt.
  sbom-path:
    description: Path to the generated SBOM.
  vulnerability-report-path:
    description: Path to the machine-readable vulnerability report.
  validation-report-path:
    description: Path to the human/machine-readable results summary.
  validation-predicate-path:
    description: Path to the in-toto validation predicate JSON.
  evidence-manifest-path:
    description: Path to the versioned downstream evidence handoff manifest.
  attestation-bundle-path:
    description:
      Directory of signed attestation bundles, when signer is not none.
  attestation-url:
    description: URL of the validation attestation, set for signer github.

runs:
  using: node24
  main: dist/index.js
