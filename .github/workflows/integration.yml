name: Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # One job runs the shared prep (apt tools + seeded QCOW2) and then every case
  # as a sequence of steps. Building a fresh libguestfs appliance per job is the
  # expensive part, so keeping the cases in one job is markedly cheaper than a
  # matrix. The action itself runs from the committed dist/ (node24), so no npm
  # build is needed here.
  build-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install libguestfs and qemu for test-image creation
        # The action installs these itself at run time, but creating the seeded
        # image with guestfish must happen BEFORE the action runs, so they are
        # needed up front here too.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-utils libguestfs-tools
          # The libguestfs direct backend's supermin appliance must read the host
          # kernel image as the non-root runner user.
          sudo chmod +r /boot/vmlinuz-*

      - name: Create the seeded QCOW2 test image
        env:
          LIBGUESTFS_BACKEND: direct
        run: |
          .github/scripts/make-test-image.sh disk.qcow2
          # Record the pre-run digest so we can prove the action never mutates it.
          sha256sum disk.qcow2 | awk '{print $1}' > disk.pre.sha256
          echo "Seeded disk digest: $(cat disk.pre.sha256)"

      # ---- Positive case: report-only, must pass, full evidence --------------
      - name: Run action (positive, report-only)
        id: positive
        uses: ./
        with:
          disk-path: disk.qcow2
          output-directory: ./evidence-positive
          fail-on-severity: none
          signer: none

      - name: Assert positive-case evidence and integrity
        run: |
          set -euo pipefail
          dir=evidence-positive

          echo "All evidence files exist"
          for f in \
            checksums.txt \
            sbom.spdx.json \
            vulnerability-report.json \
            validation-report.json \
            validation-predicate.json; do
            test -f "$dir/$f" || { echo "missing $dir/$f" >&2; exit 1; }
          done

          echo "disk-digest output matches sha256sum of disk.qcow2"
          hex="$(sha256sum disk.qcow2 | awk '{print $1}')"
          expected="sha256:${hex}"
          got='${{ steps.positive.outputs.disk-digest }}'
          test "$got" = "$expected" || {
            echo "disk-digest mismatch: got '$got' want '$expected'" >&2
            exit 1
          }

          echo "The input disk is byte-identical after the run"
          test "$hex" = "$(cat disk.pre.sha256)"

          echo "Predicate subject and artifact carry the input digest"
          jq -e --arg d "$hex" '.subject[0].digest.sha256 == $d' \
            "$dir/validation-predicate.json" >/dev/null
          jq -e --arg d "$hex" '.predicate.artifact.sha256 == $d' \
            "$dir/validation-predicate.json" >/dev/null

          echo "The SBOM embeds the input digest as its subject"
          jq -e --arg d "$hex" \
            '[.. | .checksumValue? // empty, .content? // empty] | any(. == $d)' \
            "$dir/sbom.spdx.json" >/dev/null

          echo "The validation report carries the input digest and references the reports"
          jq -e --arg d "$hex" '.artifact.sha256 == $d' \
            "$dir/validation-report.json" >/dev/null

          echo "Predicate has the expected basic shape and passed"
          jq -e '.predicate.schemaVersion == "1"' \
            "$dir/validation-predicate.json" >/dev/null
          jq -e '.predicateType | startswith("https://meigma.github.io/")' \
            "$dir/validation-predicate.json" >/dev/null
          jq -e '.predicate.result == "pass"' \
            "$dir/validation-predicate.json" >/dev/null
          jq -e '.predicate.operatingSystem.id == "ubuntu"' \
            "$dir/validation-predicate.json" >/dev/null
          jq -e '(.predicate.tools | length) > 0' \
            "$dir/validation-predicate.json" >/dev/null

          echo "checksums.txt verifies from the workspace root"
          sha256sum -c "$dir/checksums.txt"

      # ---- Negative case: non-QCOW2 input must abort with no evidence --------
      - name: Create a non-QCOW2 (raw) input
        run: dd if=/dev/zero of=raw.img bs=1M count=1

      - name: Run action (non-QCOW2, must fail)
        id: non_qcow2
        continue-on-error: true
        uses: ./
        with:
          disk-path: raw.img
          output-directory: ./evidence-nonqcow2
          fail-on-severity: none
          signer: none

      - name: Assert non-QCOW2 aborted before any evidence
        run: |
          set -euo pipefail
          test '${{ steps.non_qcow2.outcome }}' = 'failure' || {
            echo "expected the non-QCOW2 run to fail" >&2
            exit 1
          }
          # A fail-closed abort emits no evidence; the directory must not exist
          # (or must be empty if the action created it before aborting).
          if [ -d evidence-nonqcow2 ]; then
            test -z "$(ls -A evidence-nonqcow2)" || {
              echo "non-QCOW2 abort left evidence behind" >&2
              ls -A evidence-nonqcow2 >&2
              exit 1
            }
          fi

      # ---- Negative case: corrupt QCOW2 must abort --------------------------
      - name: Create a corrupt QCOW2
        run: |
          cp disk.qcow2 corrupt.qcow2
          # Overwrite the qcow2 L1 table cluster at host offset 0x30000
          # (3 * 64K). This is real qcow2 structural metadata, so
          # `qemu-img check` reports corruptions and exits non-zero, which is
          # exactly the integrity path src/disk.ts validateDisk must abort on.
          # Corrupting a guest data cluster instead (e.g. seek=16, offset 1M)
          # leaves qcow2 metadata intact and only breaks the ext4 later, so it
          # would not exercise the qemu-img-check branch at all.
          dd if=/dev/urandom of=corrupt.qcow2 bs=64K count=1 seek=3 conv=notrunc

      - name: Run action (corrupt, must fail)
        id: corrupt
        continue-on-error: true
        uses: ./
        with:
          disk-path: corrupt.qcow2
          output-directory: ./evidence-corrupt
          fail-on-severity: none
          signer: none

      - name: Assert corrupt input aborted
        run: |
          set -euo pipefail
          test '${{ steps.corrupt.outcome }}' = 'failure' || {
            echo "expected the corrupt run to fail" >&2
            exit 1
          }

      # ---- Threshold case: seeded HIGH CVE fails, but evidence is complete ---
      - name: Run action (threshold breach, must fail)
        id: threshold
        continue-on-error: true
        uses: ./
        with:
          disk-path: disk.qcow2
          output-directory: ./evidence-threshold
          fail-on-severity: high
          signer: none

      - name: Assert threshold breach produced complete failing evidence
        run: |
          set -euo pipefail
          dir=evidence-threshold

          test '${{ steps.threshold.outcome }}' = 'failure' || {
            echo "expected the threshold run to fail" >&2
            exit 1
          }

          echo "Evidence exists despite the failure"
          for f in \
            checksums.txt \
            sbom.spdx.json \
            vulnerability-report.json \
            validation-report.json \
            validation-predicate.json; do
            test -f "$dir/$f" || { echo "missing $dir/$f" >&2; exit 1; }
          done

          echo "The predicate records the failure and the breach"
          jq -e '.predicate.result == "fail"' \
            "$dir/validation-predicate.json" >/dev/null
          jq -e '.predicate.vulnerabilities.thresholdExceeded == true' \
            "$dir/validation-predicate.json" >/dev/null
          jq -e '.predicate.vulnerabilities.threshold == "high"' \
            "$dir/validation-predicate.json" >/dev/null

          echo "checksums.txt still verifies"
          sha256sum -c "$dir/checksums.txt"

      # ---- Encrypted-key signing: local bundles, no public services ---------
      - name: Install Cosign for integration key generation and verification
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Generate a throwaway encrypted Cosign key
        run: |
          set -euo pipefail
          password="$(openssl rand -hex 32)"
          echo "::add-mask::$password"
          echo "COSIGN_PASSWORD=$password" >> "$GITHUB_ENV"
          COSIGN_PASSWORD="$password" cosign generate-key-pair \
            --output-key-prefix integration

      - name: Run action (encrypted Cosign key, offline signing)
        id: cosign_key
        uses: ./
        with:
          disk-path: disk.qcow2
          output-directory: ./evidence-cosign-key
          fail-on-severity: none
          signer: cosign-key
          signing-key: integration.key

      - name: Verify encrypted-key bundles and negative cases
        run: |
          set -euo pipefail
          dir=evidence-cosign-key/attestations
          hex="$(sha256sum disk.qcow2 | awk '{print $1}')"

          test '${{ steps.cosign_key.outputs.attestation-bundle-path }}' = "$dir"
          test -z '${{ steps.cosign_key.outputs.attestation-url }}'
          jq -e 'has("attestationUrl") | not' \
            evidence-cosign-key/evidence-manifest.json >/dev/null

          for f in provenance sbom validation; do
            test -f "$dir/$f.sigstore.json"
            jq -e '.mediaType == "application/vnd.dev.sigstore.bundle.v0.3+json"' \
              "$dir/$f.sigstore.json" >/dev/null
            jq -e '.verificationMaterial.tlogEntries | length == 0' \
              "$dir/$f.sigstore.json" >/dev/null
          done

          cosign verify-blob-attestation \
            --bundle "$dir/provenance.sigstore.json" \
            --key integration.pub --insecure-ignore-tlog \
            --digest "$hex" --digestAlg sha256 \
            --type https://slsa.dev/provenance/v1
          cosign verify-blob-attestation \
            --bundle "$dir/sbom.sigstore.json" \
            --key integration.pub --insecure-ignore-tlog \
            --digest "$hex" --digestAlg sha256 \
            --type https://spdx.dev/Document/v2.3
          cosign verify-blob-attestation \
            --bundle "$dir/validation.sigstore.json" \
            --key integration.pub --insecure-ignore-tlog \
            --digest "$hex" --digestAlg sha256 \
            --type https://meigma.github.io/attest-vm-image/predicate/vm-image-validation/v1

          cp disk.qcow2 changed.qcow2
          printf x >> changed.qcow2
          changed_hex="$(sha256sum changed.qcow2 | awk '{print $1}')"
          if cosign verify-blob-attestation \
            --bundle "$dir/validation.sigstore.json" \
            --key integration.pub --insecure-ignore-tlog \
            --digest "$changed_hex" --digestAlg sha256 \
            --type https://meigma.github.io/attest-vm-image/predicate/vm-image-validation/v1; then
            echo "changed disk digest unexpectedly verified" >&2
            exit 1
          fi

          jq '.dsseEnvelope.signatures[0].sig = "AAAA"' \
            "$dir/validation.sigstore.json" > tampered.sigstore.json
          if cosign verify-blob-attestation \
            --bundle tampered.sigstore.json \
            --key integration.pub --insecure-ignore-tlog \
            --digest "$hex" --digestAlg sha256 \
            --type https://meigma.github.io/attest-vm-image/predicate/vm-image-validation/v1; then
            echo "tampered bundle unexpectedly verified" >&2
            exit 1
          fi

  # Opt-in signing integration: exercises signer: github end to end and verifies
  # the published attestations with the GitHub CLI. Attestations can only be
  # issued where the repository plan allows it. This repository is PUBLIC, so the
  # job is guarded on public visibility and is SKIPPED (not failed) anywhere
  # issuance is impossible — a private fork, or a private mirror on a plan
  # without Enterprise Cloud. Fork pull requests receive a read-only token and no
  # OIDC, so this job is only meaningful for same-repository runs.
  sign-image:
    if: >-
      ${{ github.event.repository.private == false && (github.event_name !=
      'pull_request' || github.event.pull_request.head.repo.full_name ==
      github.repository) }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # mint the OIDC token that identifies the signer
      attestations: write # publish attestations to the repository
      contents: read # read the workspace
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install libguestfs and qemu for test-image creation
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-utils libguestfs-tools
          sudo chmod +r /boot/vmlinuz-*

      - name: Create the seeded QCOW2 test image
        env:
          LIBGUESTFS_BACKEND: direct
        run: .github/scripts/make-test-image.sh disk.qcow2

      # signer: github pushes attestations using the github-token input, which
      # defaults to ${{ github.token }} (carrying attestations: write), so no env
      # export is needed here. fail-on-severity: none keeps the seeded CVEs from
      # failing the run, so the result is "pass" and signing actually happens.
      - name: Run action (signer github, report-only)
        id: sign
        uses: ./
        with:
          disk-path: disk.qcow2
          output-directory: ./evidence-signed
          fail-on-severity: none
          signer: github

      - name: Assert the three bundles exist and attestation-url is set
        run: |
          set -euo pipefail
          dir=evidence-signed/attestations
          for f in \
            provenance.sigstore.json \
            sbom.sigstore.json \
            validation.sigstore.json; do
            test -f "$dir/$f" || { echo "missing $dir/$f" >&2; exit 1; }
          done

          url='${{ steps.sign.outputs.attestation-url }}'
          test -n "$url" || { echo "attestation-url output was empty" >&2; exit 1; }
          echo "validation attestation: $url"

          bundle='${{ steps.sign.outputs.attestation-bundle-path }}'
          test "$bundle" = "evidence-signed/attestations" || {
            echo "attestation-bundle-path was '$bundle'" >&2
            exit 1
          }

      - name: Verify the attestation with the GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify disk.qcow2 --repo ${{ github.repository }}
