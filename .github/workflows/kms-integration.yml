name: AWS KMS integration

# This privileged smoke is intentionally manual and main-only. Configure the
# kms-integration environment with AWS_KMS_ROLE_ARN and AWS_KMS_KEY_ARN secrets,
# plus an AWS_KMS_REGION variable, and protect it with required reviewers.
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: aws-kms-integration
  cancel-in-progress: false

jobs:
  aws-kms:
    if: ${{ github.ref == 'refs/heads/main' }}
    environment: kms-integration
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check protected environment configuration
        env:
          AWS_KMS_KEY_ARN: ${{ secrets.AWS_KMS_KEY_ARN }}
          AWS_KMS_REGION: ${{ vars.AWS_KMS_REGION }}
          AWS_KMS_ROLE_ARN: ${{ secrets.AWS_KMS_ROLE_ARN }}
        run: |
          set -euo pipefail
          test -n "$AWS_KMS_KEY_ARN" || {
            echo 'kms-integration is missing AWS_KMS_KEY_ARN' >&2
            exit 1
          }
          test -n "$AWS_KMS_REGION" || {
            echo 'kms-integration is missing AWS_KMS_REGION' >&2
            exit 1
          }
          test -n "$AWS_KMS_ROLE_ARN" || {
            echo 'kms-integration is missing AWS_KMS_ROLE_ARN' >&2
            exit 1
          }

      - name: Checkout trusted main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ vars.AWS_KMS_REGION }}
          role-to-assume: ${{ secrets.AWS_KMS_ROLE_ARN }}
          role-session-name: attest-vm-image-kms-canary
          mask-aws-account-id: true

      - name: Install libguestfs and qemu for test-image creation
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-utils libguestfs-tools
          sudo chmod +r /boot/vmlinuz-*

      - name: Create the seeded QCOW2 test image
        env:
          LIBGUESTFS_BACKEND: direct
        run: .github/scripts/make-test-image.sh disk.qcow2

      - name: Run action with AWS KMS signing
        id: kms
        uses: ./
        with:
          disk-path: disk.qcow2
          output-directory: ./evidence-kms
          fail-on-severity: none
          signer: kms
          signing-key: ${{ format('awskms:///{0}', secrets.AWS_KMS_KEY_ARN) }}

      - name: Install Cosign for independent verification
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Verify AWS KMS bundles independently
        env:
          KMS_URI: ${{ format('awskms:///{0}', secrets.AWS_KMS_KEY_ARN) }}
        run: |
          set -euo pipefail
          echo "::add-mask::$KMS_URI"
          dir=evidence-kms/attestations
          hex="$(sha256sum disk.qcow2 | awk '{print $1}')"
          cosign public-key --key "$KMS_URI" > kms.pub

          test '${{ steps.kms.outputs.attestation-bundle-path }}' = "$dir"
          test -z '${{ steps.kms.outputs.attestation-url }}'
          jq -e 'has("attestationUrl") | not' \
            evidence-kms/evidence-manifest.json >/dev/null

          verify() {
            bundle="$1"
            predicate_type="$2"
            jq -e '.mediaType == "application/vnd.dev.sigstore.bundle.v0.3+json"' \
              "$bundle" >/dev/null
            jq -e '((.verificationMaterial.tlogEntries // []) | length) == 0' \
              "$bundle" >/dev/null
            cosign verify-blob-attestation \
              --bundle "$bundle" \
              --key kms.pub --insecure-ignore-tlog \
              --digest "$hex" --digestAlg sha256 \
              --type "$predicate_type"
          }

          verify "$dir/provenance.sigstore.json" \
            'https://slsa.dev/provenance/v1'
          verify "$dir/sbom.sigstore.json" \
            'https://spdx.dev/Document/v2.3'
          verify "$dir/validation.sigstore.json" \
            'https://meigma.github.io/attest-vm-image/predicate/vm-image-validation/v1'
